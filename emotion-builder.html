<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emotion Builder</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0b0f14; color: #eef2f7; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card { border: 1px solid rgba(255,255,255,.08); border-radius: 16px; background: rgba(255,255,255,.03); padding: 16px; margin-bottom: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    button, input, textarea, select { font: inherit; }
    button { border: 1px solid rgba(255,255,255,.12); background: #18212d; color: #eef2f7; padding: 10px 12px; border-radius: 12px; cursor: pointer; }
    button:hover { background: #223041; }
    button.primary { background: #0a73e8; border-color: #0a73e8; }
    button.primary:hover { background: #0c84ff; }
    input[type="text"], textarea, select { width: 100%; border: 1px solid rgba(255,255,255,.12); background: #11161d; color: #eef2f7; border-radius: 12px; padding: 10px 12px; box-sizing: border-box; }
    textarea { min-height: 92px; resize: vertical; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .preview { border: 1px solid rgba(255,255,255,.08); border-radius: 14px; background: #0f141b; overflow: hidden; min-height: 180px; display: flex; align-items: center; justify-content: center; }
    .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .muted { color: rgba(255,255,255,.62); font-size: 13px; }
    .title { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
    .subtitle { margin: 0 0 16px; color: rgba(255,255,255,.62); }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="title">Emotion Builder</h1>
    <p class="subtitle">기본 이미지를 넣고 neutral_a 기준 레퍼런스를 만든 뒤, Grok 이미지 생성으로 감정 세트를 준비하는 페이지입니다.</p>

    <div class="card">
      <div class="row">
        <input id="baseFile" type="file" accept="image/*" />
        <button class="primary" onclick="handleBaseUpload()">Base Upload</button>
        <button onclick="createNeutralA()">Create neutral_a</button>
        <button onclick="generateEmotionBatch()">Generate emotions</button>
      </div>
      <p class="muted" id="status">아직 준비 안 됨.</p>
    </div>

    <div class="grid">
      <div class="card">
        <div class="muted">Base image</div>
        <div class="preview" id="basePreview">None</div>
      </div>
      <div class="card">
        <div class="muted">neutral_a reference</div>
        <div class="preview" id="neutralPreview">None</div>
      </div>
      <div class="card">
        <div class="muted">Grok result</div>
        <div class="preview" id="resultPreview">None</div>
      </div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:10px">
        <input id="pidInput" type="text" placeholder="pid (예: p_riley)" style="max-width:220px" />
        <input id="promptInput" type="text" placeholder="감정 프롬프트 (예: neutral, shy, surprise ...)" />
      </div>
      <textarea id="notes" placeholder="나중에 여기에 배치 규칙, 감정 리스트, 생성 옵션을 붙이면 됩니다."></textarea>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/emotion_builder.js"></script>
</body>
</html>
